name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
no-changes-template: "- No user-facing changes in this release."
template: |
  ## What's Changed

  $CHANGES

  ## Full Changelog
  https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

version-resolver:
  major:
    labels:
      - major
  minor:
    labels:
      - feature
      - enhancement
  patch:
    labels:
      - fix
      - bug
      - docs
      - chore
  default: patch

categories:
  - title: "Features"
    labels:
      - feature
      - enhancement
  - title: "Fixes"
    labels:
      - fix
      - bug
  - title: "Documentation"
    labels:
      - docs
  - title: "Maintenance"
    labels:
      - chore
      - refactor
      - ci

exclude-labels:
  - skip-changelog
