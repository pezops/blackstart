name: Pages Deploy

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    if:
      github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_sha  ==
      github.sha
    steps:
      - name: Checkout code at tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: "pip"
          cache-dependency-path: "docs/requirements.txt"

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Build Helm repository index
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/chart-packages site/charts

          curl -fsSL "https://pezops.github.io/blackstart/charts/index.yaml" -o /tmp/existing-index.yaml || true
          if [ ! -s /tmp/existing-index.yaml ]; then
            cat > /tmp/existing-index.yaml <<'YAML'
          apiVersion: v1
          entries: {}
          YAML
          fi

          releases_api="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=100"
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${releases_api}" > /tmp/releases.json

          jq -r '
            .[]
            | select(.draft == false)
            | . as $release
            | .assets[]?
            | select(.name | test("^blackstart(-chart)?-[0-9A-Za-z.+-]+\\.tgz$"))
            | [$release.tag_name, .name, .browser_download_url]
            | @tsv
          ' /tmp/releases.json > /tmp/release-assets.tsv

          if [ ! -s /tmp/release-assets.tsv ]; then
            cp /tmp/existing-index.yaml site/charts/index.yaml
            echo "No published chart assets found in releases; keeping existing chart index."
            exit 0
          fi

          python - <<'PY'
          import yaml
          from pathlib import Path

          idx_path = Path("/tmp/existing-index.yaml")
          out_path = Path("/tmp/existing-versions.txt")

          idx = yaml.safe_load(idx_path.read_text(encoding="utf-8")) or {}
          versions = []
          for entry in (idx.get("entries") or {}).get("blackstart") or []:
              v = (entry or {}).get("version")
              if v:
                  versions.append(str(v))

          out_path.write_text("\n".join(sorted(set(versions))) + ("\n" if versions else ""), encoding="utf-8")
          PY

          : > /tmp/missing-assets.tsv
          while IFS=$'\t' read -r tag name url; do
            [ -n "${tag}" ] || continue
            [ -n "${name}" ] || continue
            [ -n "${url}" ] || continue
            version="${tag#v}"
            if ! grep -Fxq "${version}" /tmp/existing-versions.txt 2>/dev/null; then
              printf '%s\t%s\t%s\t%s\n' "${version}" "${tag}" "${name}" "${url}" >> /tmp/missing-assets.tsv
            fi
          done < /tmp/release-assets.tsv

          cp /tmp/existing-index.yaml /tmp/merged-index.yaml

          if [ ! -s /tmp/missing-assets.tsv ]; then
            cp /tmp/merged-index.yaml site/charts/index.yaml
            echo "No missing chart versions; existing index is current."
            exit 0
          fi

          while IFS=$'\t' read -r version tag name url; do
            [ -n "${version}" ] || continue
            [ -n "${tag}" ] || continue
            [ -n "${name}" ] || continue
            [ -n "${url}" ] || continue

            curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/octet-stream" \
              "${url}" \
              -o "/tmp/chart-packages/${name}"

            helm repo index /tmp/chart-packages \
              --url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}" \
              --merge /tmp/merged-index.yaml

            mv /tmp/chart-packages/index.yaml /tmp/merged-index.yaml
            rm -f "/tmp/chart-packages/${name}"
            echo "Merged missing chart version ${version} from ${tag}."
          done < /tmp/missing-assets.tsv

          cp /tmp/merged-index.yaml site/charts/index.yaml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/

  publish-pages:
    name: Publish Documentation to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
