name: Pages Deploy

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    if:
      github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_sha  ==
      github.sha
    steps:
      - name: Checkout code at tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: "pip"
          cache-dependency-path: "docs/requirements.txt"

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Build Helm repository index
        uses: actions/github-script@v8
        env:
          GH_TOKEN: ${{ github.token }}
          CHART_INDEX_OUTPUT: site/charts/index.yaml
          CHART_EXISTING_INDEX_URL: https://pezops.github.io/blackstart/charts/index.yaml
          CHART_INCLUDE_LOCAL: "false"
          CHART_PRINT_OUTPUT: "true"
        with:
          script: |
            const buildChartIndex = require('./.github/scripts/build-chart-index.js');
            await buildChartIndex({ github, context, core });

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/

  publish-pages:
    name: Publish Documentation to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
