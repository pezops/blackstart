name: Lint and Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Generate CRDs
        run: make crds

      - name: Check for are out of sync code
        run: |
          # Check if generated files are out of sync
          echo "::group::Check if generated files are out of sync"

          if [[ -n $(git status --porcelain) ]]; then
            echo "❌ Generated files are out of sync with the repository"
            echo "Please run 'make crds' locally and commit the changes"
            echo ""
            echo "Files with changes:"
            git status --porcelain
            echo ""
            echo "Diff:"
            git diff
            exit 1
          fi
          echo "✅ Generated files are up to date"
          echo "::endgroup::"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 1

  upload-coverage:
    name: Upload Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: test
    if: always() && needs.test.result == 'success'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-report

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          flags: unittests
          use_oidc: "true"

  docs-build:
    name: Test Documentation Build
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: "pip"
          cache-dependency-path: "docs/requirements.txt"

      - name: Install Python dependencies
        run: pip install -r docs/requirements.txt

      - name: Build MkDocs site with strict mode
        run: mkdocs build --strict

  ci-js-unit-tests:
    name: CI JS Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Run chart index JS tests
        run: node --test .github/scripts/build-chart-index.test.js

  # Summary job that will be used for branch protection
  lint-test-success:
    name: Lint and Test Success
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs: [lint, test, docs-build, ci-js-unit-tests]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "❌ Lint job failed"
            exit 1
          fi

          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ Test job failed"
            exit 1
          fi

          if [[ "${{ needs.docs-build.result }}" != "success" ]]; then
            echo "❌ Documentation build failed"
            exit 1
          fi

          if [[ "${{ needs.ci-js-unit-tests.result }}" != "success" ]]; then
            echo "❌ CI JS unit tests failed"
            exit 1
          fi

          echo "✅ All CI checks passed!"
