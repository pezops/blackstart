name: Release

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  REPO_NAME: ${{ github.repository }}
  RELEASE_VERSION: ${{ github.event.release.tag_name }}

jobs:
  ko-build-publish:
    name: Publish Container Image
    runs-on: ubuntu-latest
    outputs:
      image_full_ref: ${{ steps.digest.outputs.full_ref }}
      image_digest: ${{ steps.digest.outputs.digest }}
      image_tag: ${{ steps.version.outputs.tag }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup ko
        uses: ko-build/setup-ko@v0.9

      - name: Prepare version tag
        id: version
        run: |
          # Strip leading 'v' from tag for container image tag
          VERSION="${RELEASE_VERSION#v}"
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${VERSION}"

      - name: Build & publish image with ko (multi-arch)
        id: ko
        env:
          KO_DOCKER_REPO: ${{ env.REGISTRY }}/${{ env.REPO_NAME }}
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          # --bare => don't include the import path in the image name
          # --tags => apply your git tag (without 'v' prefix)
          # --platform=all uses KO_DEFAULTPLATFORMS
          IMAGE_REF=$(ko build --bare \
            --platform=all \
            --tags "${{ steps.version.outputs.tag }}" \
            ./cmd/blackstart)
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Resolve image digest
        id: digest
        run: |
          # ko build returns an image reference that includes the digest.
          IMAGE_REF="${{ steps.ko.outputs.image_ref }}"
          if [[ "${IMAGE_REF}" != *@sha256:* ]]; then
            echo "ko image reference did not include a digest: ${IMAGE_REF}"
            exit 1
          fi
          DIGEST="${IMAGE_REF##*@}"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "full_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "Image digest: ${DIGEST}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Sign image with Cosign (keyless via GitHub OIDC)
        run: cosign sign --yes "${{ steps.digest.outputs.full_ref }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.REPO_NAME }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      - name: Show published artifact
        run: |
          echo "Published:  ${{ steps.ko.outputs.image_ref }}:${{ steps.version.outputs.tag }}"
          echo "Digest:     ${{ steps.digest.outputs.digest }}"

  publish-latest-tag:
    name: Publish latest Container Tag
    needs:
      - ko-build-publish
      - check-if-latest
    if: needs.check-if-latest.outputs.is_latest == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Tag release digest as latest
        run: |
          IMAGE_REPO="${{ env.REGISTRY }}/${{ env.REPO_NAME }}"
          IMAGE_DIGEST="${{ needs.ko-build-publish.outputs.image_digest }}"
          SOURCE_REF="${IMAGE_REPO}@${IMAGE_DIGEST}"
          TARGET_REF="${IMAGE_REPO}:latest"

          docker buildx imagetools create --tag "${TARGET_REF}" "${SOURCE_REF}"
          echo "Tagged ${TARGET_REF} -> ${SOURCE_REF}"

  publish-helm-chart:
    name: Publish Helm Chart Asset
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Prepare chart version
        id: chart-version
        run: |
          CHART_VERSION="${RELEASE_VERSION#v}"
          echo "version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Chart version: ${CHART_VERSION}"

      - name: Package chart
        run: |
          mkdir -p dist/charts
          helm package charts/blackstart \
            --version "${{ steps.chart-version.outputs.version }}" \
            --app-version "${{ steps.chart-version.outputs.version }}" \
            --destination dist/charts
          mv \
            "dist/charts/blackstart-${{ steps.chart-version.outputs.version }}.tgz" \
            "dist/charts/blackstart-chart-${{ steps.chart-version.outputs.version }}.tgz"

      - name: Upload chart asset to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${RELEASE_VERSION}" \
            "dist/charts/blackstart-chart-${{ steps.chart-version.outputs.version }}.tgz" \
            --clobber

  check-if-latest:
    name: Check if Latest Release
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest
    outputs:
      is_latest: ${{ steps.check.outputs.is_latest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if tag matches main branch
        id: check
        run: |
          TAG_COMMIT=$(git rev-list -n 1 ${{ github.event.release.tag_name }})
          MAIN_COMMIT=$(git rev-list -n 1 origin/main)

          echo "Tag commit: ${TAG_COMMIT}"
          echo "Main commit: ${MAIN_COMMIT}"

          if [[ "${TAG_COMMIT}" == "${MAIN_COMMIT}" ]]; then
            echo "is_latest=true" >> $GITHUB_OUTPUT
          else
            echo "is_latest=false" >> $GITHUB_OUTPUT
          fi
